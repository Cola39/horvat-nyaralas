<!DOCTYPE html>
<html lang="hu">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Nyaralási költségek nyilvántartása">
  <title>Költségek</title>

  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💸</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <nav class="nav-menu">
    <a href="index.html">Kezdőlap</a>
    <a href="costs.html" class="active">Költségek</a>
    <a href="shopping.html">Bevásárlólista</a>
  </nav>

  <main class="dashboard-layout">
    <div class="card left-column">
      <div id="tableContainer" class="loading-state">
        <em>Adatok betöltése...</em>
      </div>

      <div class="action-buttons">
        <button class="btn" onclick="saveData()">Mentés</button>
      </div>
    </div>

    <div class="right-column">
      <div class="card">
        <h3>Aktuális árfolyam</h3>
        <div class="exchange-rate-display" id="exchangeRateDisplay">-- Ft = 1€</div>
      </div>

      <div class="card summary-card">
        <h3>Összegzés</h3>
        <table>
          <tbody>
            <tr class="total-row">
              <td>Összesen</td>
              <td>
                <div class="summary-row">
                  <span id="totalSumLabel">0 Ft</span>
                  <span id="totalPerFoLabel" class="per-fo">0 Ft/fő</span>
                </div>
              </td>
            </tr>
            <tr>
              <td>Még fizetendő</td>
              <td>
                <div class="summary-row">
                  <span id="megFizetendoLabel">0 Ft</span>
                  <span id="megFizetendoPerFoLabel" class="per-fo">0 Ft/fő</span>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="costs.js"></script>
</body>

</html>
