<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Bevásárlólista a nyaraláshoz">
  <title>Bevásárlólista</title>
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛒</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="nav-menu">
    <a href="index.html">Kezdőlap</a>
    <a href="costs.html">Költségek</a>
    <a href="shopping.html" class="active">Bevásárlólista</a>
  </nav>

  <main class="card">
    <h2>Bevásárlólista</h2>
    
    <div id="loading" class="loading-state">
      <em>Betöltés...</em>
    </div>
    
    <div class="table-responsive">
      <table id="shoppingTable" class="shopping-table" style="display:none;">
        <thead>
          <tr>
            <th>Táska</th>
            <th>Kat</th>
            <th>Kategória</th>
            <th>Tárgy</th>
            <th>Db</th>
            <th>Kosárban?</th>
            <th></th> 
          </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
      </table>
    </div> 

    <div class="action-buttons">
      <button class="btn btn-secondary" onclick="addRow()">+ Új tétel</button>
      <button class="btn" onclick="saveShoppingList()">Mentés</button>
    </div>
  </main>

  <script src="shopping.js"></script>
</body>
</html>
