<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bevásárlólista</title>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="nav-menu">
    <a href="index.html">Költségek</a>
    <a href="shopping.html" class="active">Bevásárlólista</a>
  </div>

  <div class="card">
    <h2>Bevásárlólista</h2>
    <div id="loading">Betöltés... (Loading...)</div>
    
    <table id="shoppingTable" style="display:none;">
      <thead>
        <tr>
          <th>Táska</th>
          <th style="width: 60px;">Kat</th>
          <th>Tárgy</th>
          <th style="width: 60px;">Db</th>
          <th>Kosárban?</th>
          <th></th> </tr>
      </thead>
      <tbody id="tableBody">
        </tbody>
    </table>

    <div style="display: flex; justify-content: space-between;">
      <button class="btn btn-secondary" onclick="addRow()">+ Új Tárgy (Add Item)</button>
      <button class="btn" onclick="saveShoppingList()">Mentés (Save List)</button>
    </div>
  </div>

  <script src="shopping.js"></script>
</body>
</html>
