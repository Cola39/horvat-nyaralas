<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Költségek Kalkulátor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">
    <div id="tableContainer">
      <p style="padding: 20px; text-align: center;"><em>Adatok betöltése... (Loading...)</em></p>
    </div>
    <button onclick="saveData()">Mentés (Save)</button>
  </div>

  <script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxNCN0v54YmAPkFwv_Ie892IsvF80uAHt25lV56SYq4nvfEgvJLRnTANShnuIqYvgqvog/exec'; 

    // Automatically load data when the page opens
    window.onload = function() {
      fetch(scriptURL)
        .then(response => response.json())
        .then(data => renderTable(data))
        .catch(error => {
          document.getElementById('tableContainer').innerHTML = "<p style='color:red; padding: 20px;'>Hiba a betöltéskor.</p>";
          console.error(error);
        });
    };

    // This function builds the table dynamically
    function renderTable(data) {
      let html = `
        <table>
          <thead>
            <tr>
              <th>Költségek</th>
              <th>Összeg</th>
            </tr>
          </thead>
          <tbody>
      `;
      
      let isLocked = false;

      // Loop through O2:P11 data
      data.forEach(row => {
        const label = row[0]; // Megnevezés (e.g., Szállás, Összesen)
        let value = row[1];   // Összeg (e.g., 88,546 Ft)

        if (label === "" && value === "") return; // Skip entirely empty rows

        // Once we hit "Összesen", lock all rows from here downward
        if (label === "Összesen") {
          isLocked = true;
        }

        // Apply special styling if it's the totals row
        html += `<tr class="${label === 'Összesen' ? 'total-row' : ''}">`;
        html += `<td>${label}</td>`;

        if (isLocked) {
          // Render as static text
          html += `<td><span class="static-value">${value}</span></td>`;
        } else {
          // Render as an editable input. We use data-label so we know what cell it is later.
          html += `<td><input type="text" data-label="${label}" value="${value}"></td>`;
        }
        
        html += `</tr>`;
      });

      html += `</tbody></table>`;
      document.getElementById('tableContainer').innerHTML = html;
    }

    // Function to handle the save button
function saveData() {
      // Grab all the inputs from the table
      const inputs = document.querySelectorAll('input[type="text"]');
      let payload = {};

      // Map the input values to their labels
      inputs.forEach(input => {
        const label = input.getAttribute('data-label');
        payload[label] = input.value;
      });

      console.log("Adatok küldése:", payload);
      
      // Visual feedback for the user
      const button = document.querySelector('button');
      const originalText = button.innerText;
      button.innerText = 'Mentés folyamatban... (Saving...)';

      // It securely sends the payload to your Google Sheet
      fetch(scriptURL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      })
      .then(response => response.json())
      .then(data => {
        console.log('Siker (Success)!', data);
        alert('A táblázat sikeresen frissítve lett!');
        button.innerText = originalText; // Reset button text
      })
      .catch(error => {
        console.error('Hiba (Error)!', error);
        alert('Hiba történt a mentés során.');
        button.innerText = originalText; // Reset button text
      });
    }  </script>

</body>
</html>
