<!DOCTYPE html>
<html lang="hu">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Nyaralási költségek és bevásárlólista kezelése">
  <title>Nyaralás</title>

  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏝️</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <nav class="nav-menu">
    <a href="index.html" class="active">Kezdőlap</a>
    <a href="costs.html">Költségek</a>
    <a href="shopping.html">Bevásárlólista</a>
  </nav>

  <main class="card home-card">
    <h2>🏖️ Horvátországi Nyaralás</h2>
    <p class="subtitle">Üdvözöllek!</p>

    <p>Válassz az alábbi lehetőségek közül:</p>

    <div class="action-buttons home-buttons">
      <button class="btn" onclick="window.location.href='costs.html'">💸 Költségek</button>
      <button class="btn" onclick="window.location.href='shopping.html'">🛒 Bevásárlólista</button>
    </div>
  </main>

  <section class="card weather-card" style="margin-top: 20px;">
    <h3>🌤️ Rovinj Időjárás</h3>
    <div class="table-responsive">
      <table id="weather-table">
        <thead>
          <tr>
            <th>Nap</th>
            <th class="center-text">Időjárás</th>
            <th class="center-text">Max</th>
            <th class="center-text">Min</th>
          </tr>
        </thead>
        <tbody id="weather-body">
          <tr>
            <td colspan="4" class="center-text">Időjárás betöltése folyamatban...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

  <script src="script.js"></script>

</body>

</html>
