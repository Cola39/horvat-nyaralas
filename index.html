<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Költségek Kalkulátor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 450px;
      margin: auto;
      background-color: #f9f9f9;
    }
    .card {
      background: white;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      border-radius: 8px;
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    /* Teal Header */
    th {
      background-color: #126e82; 
      color: white;
      padding: 15px;
      font-size: 18px;
    }
    td {
      padding: 12px 15px;
      border-bottom: 1px solid #eee;
      vertical-align: middle;
    }
    /* Lock line styling for "Összesen" */
    .total-row td {
      border-top: 3px solid #126e82;
      font-weight: bold;
    }
    /* Input box styling matching your image */
    input[type="text"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #4285f4;
      background-color: #e8f0fe;
      border-radius: 4px;
      font-size: 15px;
      box-sizing: border-box;
    }
    /* Read-only values alignment */
    .static-value {
      padding: 8px;
      display: inline-block;
    }
    button {
      background-color: #126e82;
      color: white;
      border: none;
      padding: 15px;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
      font-weight: bold;
    }
    button:hover {
      background-color: #0d5363;
    }
  </style>
</head>
<body>

  <div class="card">
    <div id="tableContainer">
      <p style="padding: 20px; text-align: center;"><em>Adatok betöltése... (Loading...)</em></p>
    </div>
    <button onclick="saveData()">Mentés (Save)</button>
  </div>

  <script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxNCN0v54YmAPkFwv_Ie892IsvF80uAHt25lV56SYq4nvfEgvJLRnTANShnuIqYvgqvog/exec'; 

    // Automatically load data when the page opens
    window.onload = function() {
      fetch(scriptURL)
        .then(response => response.json())
        .then(data => renderTable(data))
        .catch(error => {
          document.getElementById('tableContainer').innerHTML = "<p style='color:red; padding: 20px;'>Hiba a betöltéskor.</p>";
          console.error(error);
        });
    };

    // This function builds the table dynamically
    function renderTable(data) {
      let html = `
        <table>
          <thead>
            <tr>
              <th>Költségek</th>
              <th>Összeg</th>
            </tr>
          </thead>
          <tbody>
      `;
      
      let isLocked = false;

      // Loop through O2:P11 data
      data.forEach(row => {
        const label = row[0]; // Megnevezés (e.g., Szállás, Összesen)
        let value = row[1];   // Összeg (e.g., 88,546 Ft)

        if (label === "" && value === "") return; // Skip entirely empty rows

        // Once we hit "Összesen", lock all rows from here downward
        if (label === "Összesen") {
          isLocked = true;
        }

        // Apply special styling if it's the totals row
        html += `<tr class="${label === 'Összesen' ? 'total-row' : ''}">`;
        html += `<td>${label}</td>`;

        if (isLocked) {
          // Render as static text
          html += `<td><span class="static-value">${value}</span></td>`;
        } else {
          // Render as an editable input. We use data-label so we know what cell it is later.
          html += `<td><input type="text" data-label="${label}" value="${value}"></td>`;
        }
        
        html += `</tr>`;
      });

      html += `</tbody></table>`;
      document.getElementById('tableContainer').innerHTML = html;
    }

    // Function to handle the save button
    function saveData() {
      // Grab all the inputs from the table
      const inputs = document.querySelectorAll('input[type="text"]');
      let payload = {};

      // Map the input values to their labels
      inputs.forEach(input => {
        const label = input.getAttribute('data-label');
        payload[label] = input.value;
      });

      console.log("Adatok küldése:", payload);
      alert("A mentés gombot megnyomtad! (Nézd meg a konzolt a böngészőben)");
      
      // Note: The fetch() POST request will go here once we align the backend!
    }
  </script>

</body>
</html>
